apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
spec:
  # Zaczynamy od 0, by obciążyć klaster ręcznie na komendę!
  replicas: 0
  selector:
    matchLabels:
      app: load-gen
  template:
    metadata:
      labels:
        app: load-gen
    spec:
      containers:
      - name: hey
        # 'hey' to potężne narzędzie do generowania ruchu HTTP
        image: williamyeh/hey
        # Wysyła zapytania przez 10 minut, 50 zapytań naraz, prosto do naszej usługi
        args: ["-z", "10m", "-c", "50", "http://burner-service:80/"]